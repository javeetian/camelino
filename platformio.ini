; Camelino PlatformIO 项目配置
; ==============================
; 用法:
;   1. 将此文件放在项目根目录
;   2. pio run           — 编译
;   3. pio run -t upload — 编译并烧录
;   4. pio device monitor — 串口监视 (115200 baud)
;
; 支持的平台:
;   rpipico2    — Raspberry Pi Pico 2 (RP2350, Arduino-Pico core)
;   rpipico     — Raspberry Pi Pico (RP2040)
;   esp32dev    — ESP32-DevKitC
;
; 编译前需要生成 bytecode.h:
;   cd tools/camelino-embed && ocamlfind ocamlc -linkpkg \
;     -package compiler-libs.common -o camelino-embed.exe main.ml
;   ./camelino-embed.exe ../../examples/Blink/blink.ml -o bytecode.h

[platformio]
default_envs = pico2

[env:pico2]
board = rp_pico2
framework = arduino
platform = https://github.com/earlephilhower/arduino-pico.git
monitor_speed = 115200

build_flags =
    -Isrc
    -Isrc/core
    -Isrc/hal
    -Isrc/ffi
    -Isrc/repl
    -Isrc/bindings
    -Iplatform/arduino
    -std=gnu99
    -Wall
    -DCAMELINO_PLATFORM_ARDUINO
    -DCAMELINO_EMBED_BYTECODE

build_src_filter =
    +<../src/core/*.c>
    +<../src/ffi/*.c>
    +<../src/bindings/*.c>
    +<../src/repl/*.c>
    +<../platform/arduino/*.c>
    +<*.c>

[env:pico]
board = rp_pico
framework = arduino
platform = https://github.com/earlephilhower/arduino-pico.git
monitor_speed = 115200

build_flags =
    -Isrc
    -Isrc/core
    -Isrc/hal
    -Isrc/ffi
    -Isrc/repl
    -Isrc/bindings
    -Iplatform/arduino
    -std=gnu99
    -Wall
    -DCAMELINO_PLATFORM_ARDUINO
    -DCAMELINO_EMBED_BYTECODE
    -DHEAP_SIZE=98304

build_src_filter =
    +<../src/core/*.c>
    +<../src/ffi/*.c>
    +<../src/bindings/*.c>
    +<../src/repl/*.c>
    +<../platform/arduino/*.c>
    +<*.c>

[env:esp32dev]
board = esp32dev
framework = arduino
platform = espressif32
monitor_speed = 115200

build_flags =
    -Isrc
    -Isrc/core
    -Isrc/hal
    -Isrc/ffi
    -Isrc/repl
    -Isrc/bindings
    -Iplatform/arduino
    -std=gnu99
    -Wall
    -DCAMELINO_PLATFORM_ARDUINO
    -DCAMELINO_EMBED_BYTECODE
    -DCAMELINO_WORD_SIZE=32
    -DCAMELINO_HAS_FPU=0

build_src_filter =
    +<../src/core/*.c>
    +<../src/ffi/*.c>
    +<../src/bindings/*.c>
    +<../src/repl/*.c>
    +<../platform/arduino/*.c>
    +<*.c>
