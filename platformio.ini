; Camelino PlatformIO 项目配置示例
; 用法：platformio init --board rp_pico2 然后编辑 src/main.cpp #include <Camelino.h>

[env:pico2]
board = rp_pico2
framework = arduino
platform = https://github.com/earlephilhower/arduino-pico.git

; Camelino 依赖
lib_deps =
    ; Camelino 本身通过 library.properties 自动识别

; Include 路径
build_flags =
    -Isrc
    -Isrc/core
    -Isrc/hal
    -Isrc/ffi
    -Isrc/repl
    -Isrc/bindings
    -Iplatform/arduino
    -DCAMELINO_PLATFORM_ARDUINO
